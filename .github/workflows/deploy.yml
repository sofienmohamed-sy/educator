name: Deploy (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  verify:
    name: Verify before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    name: Deploy hosting · functions · firestore · storage
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm --workspace apps/web run build
      - run: npm --workspace functions run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@^13

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ]; then
            echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/sa.json"
            export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
            AUTH_FLAGS=""
          else
            AUTH_FLAGS="--token $FIREBASE_TOKEN"
          fi
          firebase deploy \
            --project "$FIREBASE_PROJECT_ID" \
            --only "hosting,functions,firestore:rules,firestore:indexes,storage:rules" \
            --non-interactive \
            --force \
            $AUTH_FLAGS
