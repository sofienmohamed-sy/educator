name: Deploy (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  verify:
    name: Verify before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    name: Deploy hosting · functions · firestore · storage
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm --workspace apps/web run build
      - run: npm --workspace functions run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Push every runtime secret the functions need from GitHub Actions into
      # Firebase Secret Manager, one line per secret. Each call creates a new
      # Secret Manager version; Cloud Functions binds to the latest on the
      # next deploy below. Add more lines here as you add new defineSecret()
      # calls in functions/src.
      - name: Sync Cloud Functions secrets from GitHub
        run: |
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | npx firebase-tools functions:secrets:set ANTHROPIC_API_KEY \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --data-file=-

      - name: Deploy to Firebase
        run: |
          npx firebase-tools deploy \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --only "hosting,functions,firestore:rules,firestore:indexes,storage:rules" \
            --non-interactive \
            --force
